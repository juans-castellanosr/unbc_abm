source: https://github.com/juans-castellanosr/unbc_abm.git
root: public_html/public
features:
  - php 8.4
  - mysql
  - node 18.20.5
nginx:
  fastcgi: "on"
  http2: true
  server_tokens: "off"
  charset: "utf-8"
  add_header:
    - "X-Frame-Options SAMEORIGIN"
    - "X-XSS-Protection \"1; mode=block\""
    - "X-Content-Type-Options nosniff"
  access_log: "off"
  locations:
    - match: /
      try_files: $uri $uri/ /index.php$is_args$args
    - match: ~ \.[^\/]+(?<!\.php)$
      try_files: $uri =404
    - match: ~ ^/build/(.*)$
      root: /public_html/public/build
    - match: "/app/app-key"
      proxy_pass: "http://127.0.0.1:6001"
      proxy_read_timeout: "60"
      proxy_connect_timeout: "60"
      proxy_redirect: "off"
      proxy_http_version: "1.1"
      proxy_cache_bypass: "$http_upgrade"
      proxy_set_header:
        - "Upgrade $http_upgrade"
        - "Connection 'upgrade'"
        - "Host $host"
        - "X-Real-IP $remote_addr"
        - "X-Forwarded-For $proxy_add_x_forwarded_for"
        - "X-Forwarded-Proto $scheme"
commands:
  - composer install
  - cp .env.example .env
  - sed -ri "s/(# )?DB_CONNECTION=.*/DB_CONNECTION=mysql/g" .env
  - sed -ri "s/(# )?DB_HOST=.*/DB_HOST=localhost/g" .env
  - sed -ri "s/(# )?DB_PORT=.*/DB_PORT=3306/g" .env
  - sed -ri "s/(# )?DB_DATABASE=.*/DB_DATABASE=${DATABASE}/g" .env
  - sed -ri "s/(# )?DB_USERNAME=.*/DB_USERNAME=${USERNAME}/g" .env
  - sed -ri "s/(# )?DB_PASSWORD=.*/DB_PASSWORD=${MYPASSWD}/g" .env
  - sed -ri "s/APP_URL=.*/APP_URL=https:\/\/${DOMAIN}/g" .env
  - sed -ri "s/(# )?APP_NAME=.*/APP_NAME=\"User manager\"/g" .env
  - sed -ri "s/(# )?SESSION_DRIVER=.*/SESSION_DRIVER=cookie/g" .env
  - sed -ri "s/(# )?SESSION_DOMAIN=.*/SESSION_DOMAIN=${DOMAIN}/g" .env
  - sed -ri "s/(# )?SESSION_SECURE_COOKIE=.*/SESSION_SECURE_COOKIE=true/g" .env
  - sed -ri "s/(# )?BROADCAST_DRIVER=.*/BROADCAST_DRIVER=pusher/g" .env
  - sed -ri "s/(# )?PUSHER_APP_ID=.*/PUSHER_APP_ID=app-id/g" .env
  - sed -ri "s/(# )?PUSHER_APP_KEY=.*/PUSHER_APP_KEY=app-key/g" .env
  - sed -ri "s/(# )?PUSHER_APP_SECRET=.*/PUSHER_APP_SECRET=app-secret/g" .env
  - sed -ri "s/(# )?PUSHER_HOST=.*/PUSHER_HOST=${DOMAIN}/g" .env
  - sed -ri "s/(# )?PUSHER_PORT=.*/PUSHER_PORT=443/g" .env
  - sed -ri "s/(# )?PUSHER_SCHEME=.*/PUSHER_SCHEME=https/g" .env
  - sed -ri "s/(# )?PUSHER_APP_CLUSTER=.*/PUSHER_APP_CLUSTER=mt1/g" .env
  - sed -ri "s/(# )?VITE_PUSHER_APP_KEY=.*/VITE_PUSHER_APP_KEY=\${PUSHER_APP_KEY}/g" .env
  - sed -ri "s/(# )?VITE_PUSHER_HOST=.*/VITE_PUSHER_HOST=\${PUSHER_HOST}/g" .env
  - sed -ri "s/(# )?VITE_PUSHER_PORT=.*/VITE_PUSHER_PORT=\${PUSHER_PORT}/g" .env
  - sed -ri "s/(# )?VITE_PUSHER_SCHEME=.*/VITE_PUSHER_SCHEME=\${PUSHER_SCHEME}/g" .env
  - sed -ri "s/(# )?VITE_PUSHER_APP_CLUSTER=.*/VITE_PUSHER_APP_CLUSTER=\${PUSHER_APP_CLUSTER}/g" .env
  - npm install -g @soketi/soketi
  - npm install -g pm2
  - npm install
  - npm run build
  - php artisan key:generate
  - php artisan storage:link
  - php artisan migrate --force
  - php artisan db:seed --force
  - php artisan livewire:publish --assets
  - php artisan config:clear
  - php artisan route:clear
  - php artisan view:clear
  - php artisan config:cache
  - php artisan route:cache
  - php artisan view:cache
  - php artisan optimize
  - mv public/build/.vite/manifest.json public/build/manifest.json || true
  - chmod -R 775 storage bootstrap/cache
  - pm2 start soketi-pm2 -- start
  - pm2 save